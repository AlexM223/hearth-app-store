manifestVersion: 1
id: ingle-hearth
# Community-store convention differs from the official store here: `icon:`
# is expected as a real hosted URL (the official-store skill's "omit icon"
# rule is specific to getumbrel/umbrel-apps, which hosts icons separately --
# confirmed against getumbrel/umbrel-community-app-store's own template app,
# which sets `icon:` to a real image URL). icon.svg sits alongside this file
# in the store repo: a 256x256 scale-up of the app's own favicon flame.
icon: https://raw.githubusercontent.com/AlexM223/hearth-app-store/main/ingle-hearth/icon.svg
category: bitcoin
name: Hearth
version: "0.2.1"
tagline: Come navigate Bitcoin with me
description: >-
  Hearth is the always-watching Bitcoin wallet for the people you trust: you
  run the node -- the strong, warm core -- and you invite family and friends
  to come navigate Bitcoin with you. One verified chain, one mempool, one
  shared view; every member keeps their own keys; the watchtower tells each
  of them the moment their money moves.


  What's aboard: one unified wallet engine for watch-only, single-sig, and
  multisig spends -- build, review, and broadcast a PSBT through a single
  code path, signing with whatever external signer you already trust; invite
  by link so a guest sets their own password and lands on a captain-branded
  welcome, never a shared secret; a pool-aware block explorer built entirely
  from your own node; an off-by-default solo Stratum mining pool with a
  first-party dashboard (hashrate, best-share trophy, per-worker table); and
  the watchtower -- fail-closed, SPV-verified push notifications over email,
  Telegram, ntfy, Nostr, or webhook the moment money moves, never on a price
  tick.


  Signing itself happens right in the browser: plug in a Ledger, Trezor, or
  BitBox02, or go air-gapped with a signed-transaction file or an animated
  QR code -- whichever signer you already trust. A couple of ports beyond
  the usual Umbrel app page are worth knowing about before you install.
  Hearth also publishes a self-signed HTTPS listener on port 4489, which is
  what gives the browser the secure connection that Ledger and camera
  QR-scanning need (Trezor's popup, a BitBox02 reached through the
  BitBoxBridge app, and file-based signing all work over the app's usual
  address, no extra step); your browser will ask you to accept its
  certificate the first time it sends you there, and that's expected. If
  you turn on the solo mining pool (off by default), your miner (e.g. a
  Bitaxe) connects to this box on port 3343 (standard difficulty) or 3345
  (ASIC-floor difficulty); nothing listens on either port until mining is
  enabled.


  Runs 100% on your own node -- no cloud, no telemetry, nothing leaves this box.
releaseNotes: >-
  0.2.1 -- small polish from live testing of the invite flow: the
  one-time invite link now has a real Copy button (it was shown once
  with "copy it now" and no way to copy but manual selection). The
  full invite -> come-aboard -> member-home path, light theme, and
  send-form validation were exercised end to end in this round with
  no other findings.
developer: Alex Martinez
