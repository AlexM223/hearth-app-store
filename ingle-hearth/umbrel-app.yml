path: ""
# The literal bootstrap username auth/users.ts creates on first run -- NOT an
# email-shaped placeholder. Verified against a real first-boot: logging in
# with anything else fails (caught live when "admin@hearth.local" was
# advertised here; the app's bootstrapAdminFromEnv inserts exactly 'admin').
defaultUsername: "admin"
deterministicPassword: true
backupIgnore:
  - data/logs
  - data/tls
  - data/secret.key
submitter: Alex Martinez
# This app ships through Alex's own community store (this repo,
